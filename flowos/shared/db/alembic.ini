# =============================================================================
# FlowOS — Alembic Configuration
# =============================================================================
# This file is used by Alembic for database migration management.
#
# Usage:
#   alembic -c shared/db/alembic.ini upgrade head
#   alembic -c shared/db/alembic.ini revision --autogenerate -m "add users table"
#   alembic -c shared/db/alembic.ini downgrade -1
#   alembic -c shared/db/alembic.ini history --verbose
#   alembic -c shared/db/alembic.ini current
# =============================================================================

[alembic]
# Path to the migration scripts directory, relative to this config file.
script_location = migrations

# Template for new migration file names.
# %(rev)s  — short revision ID
# %(slug)s — slugified version of the migration message
# %(year)d, %(month).2d, %(day).2d — date components
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Timezone for the generated timestamps in migration file names.
timezone = UTC

# Truncate the slug to this many characters.
truncate_slug_length = 60

# Output encoding for migration scripts.
output_encoding = utf-8

# The database URL is read from the DATABASE_SYNC_URL environment variable
# in env.py.  This value is a fallback for tools that read alembic.ini
# directly (e.g. some IDE plugins).
sqlalchemy.url = postgresql://flowos:flowos_secret@localhost:5432/flowos

# =============================================================================
# Logging configuration
# =============================================================================
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
